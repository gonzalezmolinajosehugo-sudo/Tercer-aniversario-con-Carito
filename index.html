body{
margin:0;

text-align:center;
background:linear-gradient(135deg,#ff4da6,#7a00cc);

/* CORAZONES */
.heart{
position:fixed;
top:-10px;
color:#ffb6d9;
animation:fall linear forwards;
font-size:20px;
pointer-events:none;
}

@keyframes fall{
to{
transform:translateY(110vh);

}
}

/* INTRO */
#intro{
position:fixed;
inset:0;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}

#intro button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
background:white;
color:#c1005b;
font-weight:bold;
cursor:pointer;
}

h1{margin-top:40px;}

.btn{
background:white;
color:#c1005b;
border:none;
padding:12px 24px;
border-radius:30px;
cursor:pointer;
margin:10px;
font-weight:bold;
}

/* CONTADOR */
#contador{
font-size:20px;
margin:15px;
font-weight:bold;
}

/* GALERIA */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:40px;
}

.gallery img{
width:100%;
height:260px;
object-fit:cover;
border-radius:20px;
cursor:pointer;
opacity:0;
transform:translateY(20px);
}

.gallery img.show{
opacity:1;
transform:translateY(0);
transition:all .8s ease;
}

/* VIDEO */
.video-box{
width:min(900px,95%);
margin:auto;
}

.video-box iframe{
width:100%;
height:500px;
border-radius:20px;
}

/* MODAL FOTO */
.modalImg{
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.modalImg img{
max-width:90%;
max-height:90%;
}

/* SOBRE CARTA */
#envelopeContainer{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.envelope{
width:300px;
height:200px;
background:white;
position:relative;
cursor:pointer;
border-radius:10px;
}

.flap{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#ff9ac9;
clip-path:polygon(0 0,100% 0,50% 60%);
transition:transform .8s;
transform-origin:top;
}

.letter{
position:absolute;
top:10px;
left:10px;
right:10px;
bottom:10px;
background:white;
padding:15px;
overflow:auto;
display:none;
color:#333;
}

.firma{
text-align:right;
color:#c1005b;
font-weight:bold;
}

#letterText{
white-space:pre-wrap;
line-height:1.5;
}

<script>

/* CORAZONES */
setInterval(()=>{
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*4)+"s";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),7000);
},300);

/* INTRO */
function entrar(){
document.getElementById("intro").style.display="none";
document.getElementById("musica").play();
}

/* CONTADOR MEJORADO */
function actualizarContador(){
const inicio=new Date("2023-03-12");
const ahora=new Date();
let diff=ahora-inicio;

const years=Math.floor(diff/(1000*60*60*24*365));
diff-=years*1000*60*60*24*365;

const months=Math.floor(diff/(1000*60*60*24*30));
diff-=months*1000*60*60*24*30;

const days=Math.floor(diff/(1000*60*60*24));
diff-=days*1000*60*60*24;

const hours=Math.floor(diff/(1000*60*60));
diff-=hours*1000*60*60;

const mins=Math.floor(diff/(1000*60));
diff-=mins*1000*60;

const segs=Math.floor(diff/1000);

document.getElementById("contador").innerHTML=
`⏳ ${years} años ${months} meses ${days} días ${hours}h ${mins}m ${segs}s ❤️`;
}

setInterval(actualizarContador,1000);
actualizarContador();

/* MUSICA */
let reproduciendo=false;

function toggleMusica(){
const m=document.getElementById("musica");
const btn=document.getElementById("btnMusica");

if(!reproduciendo){
m.play();
btn.innerText="⏸️ Pausar música";
reproduciendo=true;
}else{
m.pause();
btn.innerText="🎵 Música";
reproduciendo=false;
}
}

/* CARTA */
const CARTA=`Mi niña felices 3 años, es impresionante lo rápido que pasa el tiempo a tu lado, sin duda alguna esto es por lo feliz y enamorado que estoy de ti. No podría imaginarme regresar en el tiempo a cuando nos conocimos en la casa de Andreita y que alguien me dijera que iba tener el privilegio de estar con esa niña tan hermosa, autentica y perfecta durante estos tres años. Contigo simplemente disfruto más mi vida, cosas tan simples como descansar, comer, ver una película, platicar, dormir, caminar, etc., haces que se sientan especial. A todo le das tu toque autentico y haces que lo disfrute más, te agradezco por estar 365 días más conmigo, que me imagino que no es fácil porque si soy un poco cadillo jajaja, pero espero y también eso haga que no te aburras. Poniéndonos un poco más serios, te quiero dar las gracias a ti por ser mi lugar seguro, un lugar en donde puedo ser yo y aunque a veces me cueste que sea un lugar en donde pueda expresar el cómo me siento, el solo verte a los ojos o sentir un abrazo tuyo hace que mis problemas dejen de verse como tal y en cambio los vea como una oportunidad de mejorar, porque si te tengo a ti a mi lado no necesito porque preocuparme. Contigo me siento pleno y seguro, no me canso de estar contigo y de poder compartir momentos inolvidables a tu lado, y sobre todo me encanta sentirme orgulloso de ti, de tu esfuerzo y dedicación que le pones a tus responsabilidades y actividades, me motiva el verte feliz haciendo cosas como ejercicio, trabajo, estudio, me llenas de orgullo el poder ver como todo lo que haces lo haces con 100 por ciento de esfuerzo y con ganas de superarte día a día. Eres la mujer de mis sueños, estaré eternamente agradecido con Dios y con la vida de que te pusiera en mi camino, gracias niña por estos tres años y aunque llevemos dos años celebrando a distancia no serán nada a lado de los que celebraremos juntos en el futuro, te amo hoy y siempre.`;

/* SOBRE */
function abrirSobre(){
document.getElementById("envelopeContainer").style.display="flex";
}

function abrirCarta(){
document.getElementById("flap").style.transform="rotateX(180deg)";
const letter=document.getElementById("letter");
letter.style.display="block";

let i=0;
let txt="";
const target=document.getElementById("letterText");

const timer=setInterval(()=>{
txt+=CARTA.charAt(i);
target.textContent=txt;
i++;
if(i>=CARTA.length) clearInterval(timer);
},15);
}

/* MODAL FOTOS */
function openModal(src){
document.getElementById("imgGrande").src=src;
document.getElementById("modalImg").style.display="flex";
}

function closeModal(){
document.getElementById("modalImg").style.display="none";
}

/* FADE FOTOS */
const imgs=document.querySelectorAll(".gallery img");

const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show");
observer.unobserve(entry.target);
}
});
});

imgs.forEach(i=>observer.observe(i));

</script>

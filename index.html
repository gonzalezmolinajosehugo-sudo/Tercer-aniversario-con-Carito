<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz 3 Años Carito ❤️</title>

<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    text-align:center;
    background: linear-gradient(135deg,#ff4da6,#7a00cc);
    color:white;
}

/* TITULO */
h1{
    margin-top:40px;
    font-size:42px;
}

/* BOTONES */
.btn{
    background:white;
    color:#c1005b;
    border:none;
    padding:12px 24px;
    border-radius:30px;
    font-weight:bold;
    cursor:pointer;
    margin:10px;
    transition:0.3s;
}
.btn:hover{
    transform:scale(1.05);
}

/* GALERIA */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:40px;
}

.gallery img{
    width:100%;
    height:260px;
    object-fit:cover;
    border-radius:20px;
    cursor:pointer;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

/* MODAL FOTO */
.modalImg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
}

.modalImg img{
    max-width:90%;
    max-height:90%;
    border-radius:20px;
}

/* MODAL CARTA */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.modal.show{
    display:flex;
}

.modal-card{
    background:white;
    color:#333;
    width:min(800px,95%);
    max-height:80vh;
    overflow:auto;
    border-radius:20px;
    padding:25px;
    text-align:left;
}

.modal-card h2{
    color:#c1005b;
}

.close-btn{
    float:right;
    cursor:pointer;
    font-weight:bold;
    font-size:18px;
}

.firma{
    text-align:right;
    font-weight:bold;
    margin-top:15px;
    color:#c1005b;
}

</style>
</head>

<body>

<h1>Feliz 3 Años, Carito ❤️</h1>
<p>Gracias por hacer mi vida más bonita desde el primer día.</p>

<button class="btn" onclick="abrirCarta()">Abrir carta 💌</button>

<p>💫 Desde que empezamos a salir (31/10/2022)</p>
<p>❤️ Desde que somos novios (12/03/2023)</p>

<!-- GALERIA -->
<div class="gallery">
    <img src="1c.jpg" onclick="openModal(this.src)">
    <img src="2c.jpg" onclick="openModal(this.src)">
    <img src="3c.jpg" onclick="openModal(this.src)">
    <img src="4c.jpg" onclick="openModal(this.src)">
    <img src="5c.jpg" onclick="openModal(this.src)">
    <img src="6c.jpg" onclick="openModal(this.src)">
    <img src="7c.jpg" onclick="openModal(this.src)">
    <img src="8c.jpg" onclick="openModal(this.src)">
    <img src="9c.jpg" onclick="openModal(this.src)">
    <img src="10c.jpg" onclick="openModal(this.src)">
    <img src="11c.jpg" onclick="openModal(this.src)">
    <img src="12c.jpg" onclick="openModal(this.src)">
    <img src="13c.jpg" onclick="openModal(this.src)">
    <img src="14c.jpg" onclick="openModal(this.src)">
    <img src="15c.jpg" onclick="openModal(this.src)">
    <img src="16c.jpg" onclick="openModal(this.src)">
    <img src="17c.jpg" onclick="openModal(this.src)">
    <img src="18c.jpg" onclick="openModal(this.src)">
    <img src="19c.jpg" onclick="openModal(this.src)">
    <img src="20c.jpg" onclick="openModal(this.src)">
    <img src="21c.jpg" onclick="openModal(this.src)">
    <img src="22c.jpg" onclick="openModal(this.src)">
    <img src="23c.jpg" onclick="openModal(this.src)">
    <img src="24c.jpg" onclick="openModal(this.src)">
    <img src="25cc.jpg" onclick="openModal(this.src)">
    <img src="26c.jpg" onclick="openModal(this.src)">
    <img src="27c.jpg" onclick="openModal(this.src)">
    <img src="28c.jpg" onclick="openModal(this.src)">
    <img src="29c.jpg" onclick="openModal(this.src)">
    <img src="30c.jpg" onclick="openModal(this.src)">
</div>

<!-- MODAL FOTO -->
<div class="modalImg" id="modalImg" onclick="closeModal()">
    <img id="imgGrande">
</div>

<!-- MODAL CARTA -->
<div id="letterModal" class="modal">
    <div class="modal-card">
        <span class="close-btn" onclick="closeLetter()">✕</span>
        <h2>Para ti, Carito ❤️</h2>
        <div id="letterText"></div>
        <div class="firma">— Jose Hugo ❤️</div>
    </div>
</div>

<script>

const CARTA = `Mi niña felices 3 años, es impresionante lo rápido que pasa el tiempo a tu lado, sin duda alguna esto es por lo feliz y enamorado que estoy de ti.

No podría imaginarme regresar en el tiempo a cuando nos conocimos en la casa de Andreita y que alguien me dijera que iba tener el privilegio de estar con esa niña tan hermosa, autentica y perfecta durante estos tres años.

Contigo simplemente disfruto más mi vida, cosas tan simples como descansar, comer, ver una película, platicar, dormir, caminar, etc., haces que se sientan especial. A todo le das tu toque autentico y haces que lo disfrute más, te agradezco por estar 365 días más conmigo, que me imagino que no es fácil porque si soy un poco cadillo jajaja, pero espero y también eso haga que no te aburras.

Poniéndonos un poco más serios, te quiero dar las gracias a ti por ser mi lugar seguro, un lugar en donde puedo ser yo y aunque a veces me cueste que sea un lugar en donde pueda expresar el cómo me siento, el solo verte a los ojos o sentir un abrazo tuyo hace que mis problemas dejen de verse como tal y en cambio los vea como una oportunidad de mejorar, porque si te tengo a ti a mi lado no necesito porque preocuparme.

Contigo me siento pleno y seguro, no me canso de estar contigo y de poder compartir momentos inolvidables a tu lado, y sobre todo me encanta sentirme orgulloso de ti, de tu esfuerzo y dedicación que le pones a tus responsabilidades y actividades, me motiva el verte feliz haciendo cosas como ejercicio, trabajo, estudio, me llenas de orgullo el poder ver como todo lo que haces lo haces con 100 por ciento de esfuerzo y con ganas de superarte día a día.

Eres la mujer de mis sueños, estaré eternamente agradecido con Dios y con la vida de que te pusiera en mi camino, gracias niña por estos tres años y aunque llevemos dos años celebrando a distancia no serán nada a lado de los que celebraremos juntos en el futuro, te amo hoy y siempre.`;

function abrirCarta(){
    document.getElementById("letterText").textContent = CARTA;
    document.getElementById("letterModal").classList.add("show");
}

function closeLetter(){
    document.getElementById("letterModal").classList.remove("show");
}

function openModal(src){
    document.getElementById("imgGrande").src = src;
    document.getElementById("modalImg").style.display="flex";
}

function closeModal(){
    document.getElementById("modalImg").style.display="none";
}

</script>

</body>
</html>
